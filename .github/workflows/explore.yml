name: Test Copernicus Datasets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install copernicusmarine xarray netCDF4 numpy

      - name: Login and explore
        env:
          COPERNICUSMARINE_USERNAME: ${{ secrets.COPERNICUS_USER }}
          COPERNICUSMARINE_PASSWORD: ${{ secrets.COPERNICUS_PASS }}
        run: |
          python3 << 'EOF'
          import os
          import copernicusmarine as cm

          U = os.environ["COPERNICUSMARINE_USERNAME"]
          P = os.environ["COPERNICUSMARINE_PASSWORD"]

          print("=== STEP 1: LOGIN TEST ===")
          try:
              cm.login(username=U, password=P, overwrite_configuration_file=True)
              print("LOGIN OK")
          except Exception as e:
              print(f"LOGIN FAIL: {e}")

          print("\n=== STEP 2: DESCRIBE ALL (no filter) ===")
          try:
              cat = cm.describe(include_datasets=True)
              print(f"Type: {type(cat)}")

              # اذا كان dict
              if isinstance(cat, dict):
                  print(f"Keys: {list(cat.keys())[:10]}")

              # اذا كان object
              elif hasattr(cat, 'products'):
                  products = cat.products
                  print(f"Total products: {len(products)}")
                  with open("datasets_found.txt", "w") as f:
                      for p in products:
                          pid = getattr(p, 'product_id', str(p))
                          f.write(f"PRODUCT: {pid}\n")
                          if hasattr(p, 'datasets'):
                              for d in p.datasets:
                                  did = getattr(d, 'dataset_id', str(d))
                                  f.write(f"  DATASET: {did}\n")
                                  # ابحث عن المتوسط و الدقة العالية
                                  did_lower = did.lower()
                                  if any(k in did_lower for k in ['med','sst','oc','olci','colour','color']):
                                      f.write(f"  *** RELEVANT ***\n")
                  print("Saved to datasets_found.txt")

              else:
                  print(f"Unknown type: {type(cat)}")
                  print(str(cat)[:500])

          except Exception as e:
              print(f"DESCRIBE FAIL: {e}")
              import traceback
              traceback.print_exc()

          print("\n=== STEP 3: DESCRIBE WITH CONTAINS ===")
          for keyword in ["mediterranean", "SST", "OLCI"]:
              try:
                  r = cm.describe(contains=[keyword], include_datasets=True)
                  print(f"\nKeyword '{keyword}':")
                  print(f"  Type: {type(r)}")
                  if hasattr(r, 'products'):
                      print(f"  Products found: {len(r.products)}")
                      for p in r.products[:5]:
                          print(f"    - {getattr(p, 'product_id', p)}")
              except Exception as e:
                  print(f"  FAIL: {e}")
          EOF

      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add datasets_found.txt || true
          git commit -m "Explore results $(date +'%Y-%m-%d %H:%M')" || echo "Nothing"
          git push
