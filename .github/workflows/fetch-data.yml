name: Fetch Copernicus Data

on:
  schedule:
    - cron: '0 5 * * *'   # كل يوم الساعة 5 صباحاً
  workflow_dispatch:       # تشغيل يدوي

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install copernicusmarine xarray netCDF4 numpy
      - name: Fetch and process data
        run: python fetch_copernicus.py
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
      - name: Commit and push data.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Update ocean data $(date +'%Y-%m-%d')" || exit 0
          git push
