name: Fetch Copernicus Data

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install copernicusmarine xarray netCDF4 numpy h5py
      - name: Debug credentials (check if secrets are available)
        run: |
          echo "Username length: ${#COPERNICUSMARINE_USERNAME}"
          if [ -z "$COPERNICUSMARINE_USERNAME" ]; then echo "USER empty"; else echo "USER not empty"; fi
        env:
          COPERNICUSMARINE_USERNAME: ${{ secrets.COPERNICUS_USER }}
          COPERNICUSMARINE_PASSWORD: ${{ secrets.COPERNICUS_PASS }}
      - name: Fetch and process data
        run: python fetch_copernicus.py
        env:
          COPERNICUSMARINE_USERNAME: ${{ secrets.COPERNICUS_USER }}
          COPERNICUSMARINE_PASSWORD: ${{ secrets.COPERNICUS_PASS }}
      - name: Commit and push data.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Update ocean data $(date +'%Y-%m-%d')" || exit 0
          git push
